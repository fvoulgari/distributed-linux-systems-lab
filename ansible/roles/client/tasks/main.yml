---
- name: Disable cloud-init network configuration
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
    owner: root
    group: root
    mode: "0644"
    content: |
      network: {config: disabled}

- name: Find existing netplan configuration files
  ansible.builtin.find:
    paths: /etc/netplan
    patterns: "*.yaml"
  register: existing_netplan_files

- name: Remove existing netplan configuration files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_netplan_files.files }}"

- name: Deploy persistent client routing netplan config
  ansible.builtin.template:
    src: 60-client-routing.yaml.j2
    dest: /etc/netplan/60-client-routing.yaml
    owner: root
    group: root
    mode: "0644"

- name: Apply netplan configuration
  ansible.builtin.command:
    cmd: netplan apply