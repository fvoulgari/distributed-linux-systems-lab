---
- name: Pre-warm ARP tables for all subnets
  ansible.builtin.command:
    cmd: ping -c 3 {{ item }}
  loop:
    - "{{ client_ip }}"
    - "{{ hostvars['backend-a'].backend_ip }}"
    - "{{ hostvars['backend-b'].backend_ip }}"
  changed_when: false
  failed_when: false
  tags:
    - always

- name: Install NFS server packages
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Create exported directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"
  loop: "{{ nfs_exports }}"

- name: Deploy shared health check script
  ansible.builtin.copy:
    src: health_check.sh
    dest: /srv/nfs/shared/scripts/health_check.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy shared backend monitor script
  ansible.builtin.copy:
    src: backend_monitor.sh
    dest: /srv/nfs/shared/scripts/backend_monitor.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy log rotation script
  ansible.builtin.copy:
    src: log_rotation.sh
    dest: /srv/nfs/shared/scripts/log_rotation.sh
    owner: root
    group: root
    mode: "0755"


- name: Deploy NFS exports configuration
  ansible.builtin.template:
    src: exports.j2
    dest: /etc/exports
    owner: root
    group: root
    mode: "0644"
  register: nfs_exports_config

- name: Ensure NFS server is enabled and running
  ansible.builtin.service:
    name: nfs-kernel-server
    enabled: true
    state: started

- name: Reload NFS exports
  ansible.builtin.command:
    cmd: exportfs -ra
  when: nfs_exports_config.changed

- name: Restart NFS server if exports changed
  ansible.builtin.service:
    name: nfs-server
    state: restarted
  when: nfs_exports_config.changed

- name: Schedule shared log rotation
  ansible.builtin.cron:
    name: "shared log rotation"
    minute: "*/10"
    job: "/bin/bash /srv/nfs/shared/scripts/log_rotation.sh"