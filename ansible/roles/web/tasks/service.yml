---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: Deploy backend index page
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.nginx-debian.html
    owner: root
    group: root
    mode: "0644"
  register: backend_index_page

- name: Ensure nginx is enabled and running
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started

- name: Reload nginx if backend page changed
  ansible.builtin.service:
    name: nginx
    state: reloaded
  when: backend_index_page.changed

- name: Run shared health check every 5 minutes
  ansible.builtin.cron:
    name: "shared health check"
    minute: "*/5"
    job: "/bin/bash /mnt/shared/scripts/health_check.sh"